{% extends "base.html" %}

{% block title %}
<title>แบบฟอร์มบันทึกข้อมูลประชากร</title>
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">แบบฟอร์มบันทึกข้อมูล</h2>
            
            <form action="/addData" method="POST" class="shadow p-4 rounded bg-light border">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label">ชื่อประชากร</label>
                    <input type="text" class="form-control" name="name" placeholder="กรอกชื่อ-นามสกุล" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">อายุ</label>
                    <input type="number" class="form-control" name="age" placeholder="กรอกอายุ" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">บันทึกข้อมูล</button>
                    <a href="/" class="btn btn-secondary">ยกเลิก</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
